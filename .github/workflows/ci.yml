name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      TEST_DATABASE_URL: "postgres://postgres:postgres@localhost:54329/atlas_test?sslmode=disable"
      DATABASE_URL: "postgres://postgres:postgres@localhost:51214/template1?sslmode=disable"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npx prisma generate

      - run: npm run typecheck

      - run: npm run lint

      - run: npm test

      - run: npm run build
