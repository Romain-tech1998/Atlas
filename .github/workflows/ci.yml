name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      TEST_DATABASE_URL: "postgres://postgres:postgres@localhost:54329/atlas_test?sslmode=disable"
      DATABASE_URL: "postgres://postgres:postgres@localhost:51214/template1?sslmode=disable"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npx prisma generate

      # `tsc --noEmit` needs Next.js's ambient PageProps/RouteContext types
      # (.next/types/*.d.ts), which only exist after a build or dev run has
      # generated them at least once. Locally that's always already true
      # (.next/ persists across sessions); a fresh CI checkout has no
      # .next/ at all (gitignored), so typecheck fails without this unless
      # something generates those types first. `next typegen` does exactly
      # that without paying for a full production build.
      - run: npx next typegen

      - run: npm run typecheck

      - run: npm run lint

      - run: npm test

      - run: npm run build
